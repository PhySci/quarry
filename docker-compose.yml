services:
  db:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_DB: ner_manager
      POSTGRES_USER: ner
      POSTGRES_PASSWORD: ner
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ner -d ner_manager"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./src/backend
    environment:
      DATABASE_URL: postgresql+asyncpg://ner:ner@db:5432/ner_manager
      FRONTEND_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./src/frontend
    environment:
      PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
